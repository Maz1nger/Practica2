<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/login.css">
    <title>Login</title>
</head>
<body>
    <main class="login-container">
        
        <section class="panel-left">
            <div class="brand-icon">☕</div>
            <div class="panel-left-content">
                <h2 id="bienvenido">Bienvenido</h2>
                
                <div class="image-wrapper">
                    <img src="https://cdn-icons-png.flaticon.com/512/8146/8146003.png" alt="carrito" class="center-image">
                </div>
            </div>
            <div></div> 
        </section>

        <section class="panel-right">
            <div class="form-wrapper">
                <div class="form-header">
                    <h1>Iniciar sesión </h1>
                </div>

                <form>
                    <div class="input-group">
                        <label for="user">Usuario</label>
                        <input type="text" id="user" placeholder="Ingresa tu usuario">
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••••••">
                    </div>

                    <div class="action-row">
                        <button type="button" id="login">Ingresar</button>
                        <p id="wrongMessage"></p>
                    </div>
                </form>
            </div>
        </section>

    </main>
    <script src="../scripts/login.js" type="module"></script>
</body>
</html>
